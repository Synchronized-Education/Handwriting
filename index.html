<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwrite AI - SyncEdu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .paper-base {
            background-color: #fff;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            min-height: 842px; /* A4 Ratio */
        }
        .lines-notebook {
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 100% 1.6rem;
        }
        .lines-folio {
            background-image: linear-gradient(#d1d5db 1px, transparent 1px);
            background-size: 100% 2.2rem;
            border-left: 2px solid #fca5a5;
            padding-left: 10px;
        }
        #outputHandwriting {
            font-family: 'Courier New', cursive;
            line-height: 1.6rem;
            color: #1e3a8a;
            mix-blend-mode: multiply;
            filter: contrast(120%) brightness(90%);
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        @media print {
            body * { visibility: hidden; }
            #paperSheet, #paperSheet * { visibility: visible; }
            #paperSheet { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- PANEL KONTROL -->
        <div class="lg:col-span-4 space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h1 class="text-xl font-black text-blue-600 mb-6 uppercase">Handwrite AI</h1>
                
                <div class="space-y-4">
                    <!-- Upload -->
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">1. Foto Tulisan Anda</label>
                        <input type="file" id="handImgInput" accept="image/*" capture="camera" class="block w-full text-xs mt-1 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700">
                    </div>

                    <!-- Kertas -->
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">2. Jenis Kertas</label>
                        <select id="selectPaper" class="w-full mt-1 p-2 bg-slate-50 border rounded-lg text-sm">
                            <option value="none">HVS Putih Polos</option>
                            <option value="notebook">Buku Tulis Bergaris</option>
                            <option value="folio">Double Folio</option>
                        </select>
                    </div>

                    <!-- Teks -->
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">3. Isi Teks</label>
                        <textarea id="textInput" rows="6" class="w-full mt-1 p-3 bg-slate-50 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ketik tugas di sini..."></textarea>
                    </div>

                    <button id="btnGenerate" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold uppercase text-sm shadow-md hover:bg-blue-700 transition">
                        Generate & Save to Firebase
                    </button>
                </div>
            </div>
        </div>

        <!-- AREA PREVIEW -->
        <div class="lg:col-span-8 flex flex-col items-center">
            <div id="paperSheet" class="paper-base w-full p-12 transition-all">
                <div id="paperLineDecorator" class="absolute inset-0 pointer-events-none"></div>
                <div id="outputHandwriting" class="relative z-10 w-full h-full outline-none" contenteditable="true">
                    Hasil akan muncul di sini...
                </div>
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="window.print()" class="bg-slate-800 text-white px-6 py-2 rounded-full text-sm font-bold">Cetak / Simpan PDF</button>
            </div>
        </div>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyBQp9Olce8JK6Y8DmjJo8zkR_1XJri8Yco",
            authDomain: "farhan-34b24.firebaseapp.com",
            projectId: "farhan-34b24",
            storageBucket: "farhan-34b24.firebasestorage.app",
            messagingSenderId: "692021812815",
            appId: "1:692021812815:web:60cf37c47d6cb06dd6543a"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getFirestore(app);

        const handImgInput = document.getElementById('handImgInput');
        const btnGenerate = document.getElementById('btnGenerate');
        const textInput = document.getElementById('textInput');
        const output = document.getElementById('outputHandwriting');
        const paperLineDecorator = document.getElementById('paperLineDecorator');

        let selectedFile = null;

        // Preview Foto & Handle File
        handImgInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    output.style.backgroundImage = `url(${event.target.result})`;
                    output.style.webkitBackgroundClip = "text";
                    output.style.backgroundSize = "250px";
                };
                reader.readAsDataURL(selectedFile);
            }
        });

        // Ganti Kertas
        document.getElementById('selectPaper').addEventListener('change', (e) => {
            paperLineDecorator.className = "absolute inset-0 pointer-events-none";
            if(e.target.value === 'notebook') paperLineDecorator.classList.add('lines-notebook');
            if(e.target.value === 'folio') paperLineDecorator.classList.add('lines-folio');
        });

        // Generate & Firebase Upload
        btnGenerate.addEventListener('click', async () => {
            const text = textInput.value;
            if(!text) return alert("Isi teks dulu!");

            output.innerText = text;
            btnGenerate.disabled = true;
            btnGenerate.innerText = "Uploading to Firebase...";

            try {
                let photoUrl = "";
                if(selectedFile) {
                    const storageRef = ref(storage, `uploads/${Date.now()}_${selectedFile.name}`);
                    await uploadBytes(storageRef, selectedFile);
                    photoUrl = await getDownloadURL(storageRef);
                }

                await addDoc(collection(db, "tugas_tulisan"), {
                    content: text,
                    imageUrl: photoUrl,
                    timestamp: new Date()
                });

                alert("Berhasil disimpan ke Firebase!");
            } catch (err) {
                console.error(err);
                alert("Gagal simpan ke Firebase. Cek console.");
            } finally {
                btnGenerate.disabled = false;
                btnGenerate.innerText = "Generate & Save to Firebase";
            }
        });
    </script>
</body>
</html>
